<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="MindfulFlow - Sledování mentálního zdraví a nálad"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="MindfulFlow" />
    <meta property="og:title" content="MindfulFlow - Sledování nálad" />
    <meta
      property="og:description"
      content="Tvůj osobní průvodce pro sledování nálady a péči o duševní zdraví."
    />
    <meta property="og:image" content="/pwa-512x512.png" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#0d1117" id="meta-theme-color" />
    <title>MindfulFlow - Sledování nálad</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon.png?v=2"
    />
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('mindfulflow_settings');
          if (!raw) return;
          var s = JSON.parse(raw);
          if (s && s.theme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            var m = document.getElementById('meta-theme-color');
            if (m) m.setAttribute('content', '#fafaf9');
          }
        } catch (e) {}
      })();
    </script>
    <style>
      #root {
        min-height: 100vh;
        min-height: 100dvh;
        width: 100%;
        display: flex;
        flex-direction: column;
      }
      body {
        margin: 0;
        background-color: #0d1117;
        color: #e6edf3;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        width: 100%;
      }
      html[data-theme='light'] body {
        background-color: #fafaf9;
        color: #18181b;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
