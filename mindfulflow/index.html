<!doctype html>
<html lang="cs" style="background-color: #0f172a">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png?v=2" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"
    />
    <meta
      name="description"
      content="MindfulFlow - Sledování mentálního zdraví a nálad"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="MindfulFlow" />
    <meta property="og:title" content="MindfulFlow - Sledování nálad" />
    <meta
      property="og:description"
      content="Tvůj osobní průvodce pro sledování nálady a péči o duševní zdraví."
    />
    <meta property="og:image" content="/pwa-512x512.png" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#0f172a" />
    <title>MindfulFlow - Sledování nálad</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon.png?v=2"
    />
    <link rel="preload" href="/fonts/outfit.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
    <style>
      @font-face {
        font-family: 'Outfit';
        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
        src: url('/fonts/outfit.woff2') format('woff2');
      }
      /* Critical minimal CSS to prevent FOUT/FOIC before JS hits */
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      body {
        margin: 0;
        background-color: #0f172a;
        color: white;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .critical-loader {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        z-index: 9999;
        font-family: 'Outfit', system-ui, sans-serif;
      }
      .critical-greeting {
        font-size: 2.5rem;
        font-weight: 800;
        color: white;
        margin-bottom: 0.5rem;
        text-align: center;
        opacity: 0.9;
      }
      .critical-subtitle {
        color: rgba(255, 255, 255, 0.7);
        font-size: 1.25rem;
        margin-bottom: 2rem;
      }
      .critical-spinner {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border-top: 2px solid #8b5cf6;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body style="background-color: #0f172a">
    <div id="root">
      <div class="critical-loader" id="critical-loader">
        <div class="critical-greeting">MindfulFlow</div>
        <div class="critical-subtitle">Načítání...</div>
        <div class="critical-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
